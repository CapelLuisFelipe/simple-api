version: 0.2

env:
  parameter-store:
    TF_VAR_db_password:             "/simple-api/tf/db_password"
    TF_VAR_github_repo:             "/simple-api/tf/github_repo"
    TF_VAR_codestar_connection_arn: "/simple-api/tf/codestar_connection_arn"
    TF_VAR_alert_email:             "/simple-api/tf/alert_email"

phases:
  install:
    commands:
      - curl -sL https://releases.hashicorp.com/terraform/1.15.4/terraform_1.15.4_linux_amd64.zip -o /tmp/terraform.zip
      - unzip -qo /tmp/terraform.zip -d /tmp/
      - install /tmp/terraform /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - echo "=== terraform init ==="
      - terraform -chdir=$TF_WORKING_DIR init -input=false
      - echo "=== terraform fmt check ==="
      - terraform -chdir=$TF_WORKING_DIR fmt -check -recursive
      - echo "=== terraform validate ==="
      - terraform -chdir=$TF_WORKING_DIR validate

  build:
    commands:
      - echo "=== terraform plan ==="
      - terraform -chdir=$TF_WORKING_DIR plan -input=false -lock-timeout=40m -out=tfplan
      - echo "=== terraform apply ==="
      - terraform -chdir=$TF_WORKING_DIR apply -input=false -lock-timeout=40m tfplan

artifacts:
  files:
    - "**/*"
